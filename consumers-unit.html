<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Year 5 HASS · We are all consumers</title>
<style>
  :root{
    --bg0:#14100c; --bg1:#1c1610; --bg2:#261e18;
    --ink:#faf6f0; --ink-dim:#c9bcb0; --ink-faint:#8a7a6a;
    --panel:#342a22; --panel2:#40342a; --line:#5a4a3d;
    --chip-bg:#2a221a;
    --cream:#fff8ed; --cream-ink:#2a2018;
    --amber:#f9d45d; --amber2:#ffe082;
    --accent:#c4845a; --accent2:#d9a070; --teal:#c4845a; --mint:#d9a070;
    --accent-on:#2a1a10;
    --notice-bg:#faf0e6; --notice-ink:#3d2818; --notice-border:#d9a070;
    --gold:#d9a070;
    /* phase accents */
    --p1:#ff5a6e; --p2:#d9a070; --p3:#5aa9ff; --p4:#b88bff; --p5:#ffb347;
    --radius:18px;
    --font: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font); color:var(--ink);
    background:var(--bg0);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }

  #app{ width:100vw; height:100vh; display:flex; flex-direction:column; }
  #stageWrap{ flex:1; display:flex; align-items:center; justify-content:center; padding:18px 18px 6px; min-height:0; }
  .slide{
    position:relative; width:min(1180px,100%); aspect-ratio:16/10; max-height:100%;
    background:
      radial-gradient(1200px 500px at 80% -10%, rgba(217,160,112,.06), transparent 60%),
      linear-gradient(160deg,var(--bg1),var(--bg2) 60%, #1e1814);
    border:1px solid var(--line); border-radius:26px;
    box-shadow:0 30px 80px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.04);
    padding:26px 38px; overflow:hidden; display:flex; flex-direction:column;
  }

  .eyebrow{ display:inline-flex; align-items:center; gap:8px; align-self:flex-start;
    background:rgba(217,160,112,.10); color:var(--accent2); border:1px solid rgba(217,160,112,.28);
    font-weight:800; letter-spacing:.14em; text-transform:uppercase; font-size:12px;
    padding:7px 14px; border-radius:999px; }
  h1.title{ font-size:clamp(28px,3.6vw,46px); line-height:1.02; margin:10px 0 12px; letter-spacing:-.01em; }
  .slide.cover h1.title{ font-size:clamp(40px,6vw,76px); }

  .cols{ display:grid; grid-template-columns:1fr 1fr; gap:14px; flex:1; min-height:0; }
  .cols.wide-left{ grid-template-columns:1.25fr .9fr; }
  .col{ display:flex; flex-direction:column; gap:8px; min-height:0; overflow:hidden; }
  .col::-webkit-scrollbar{ width:6px; } .col::-webkit-scrollbar-thumb{ background:var(--line); border-radius:6px; }

  /* IMAGE RULES — text first, images fill leftover space, caption overlaid on image only */
  html:not(.presenting):not(:fullscreen) .col > .card.cream,
  html:not(.presenting):not(:fullscreen) .col > .steps{ flex:0 1 auto; min-height:0; max-height:62%; overflow:auto; }
  .col > .imgframe,
  .col > .imgrow{ flex:1 1 0; min-height:72px; min-width:0; width:100%; }

  .card{ border-radius:var(--radius); padding:20px 22px; }
  .card.cream{ background:var(--cream); color:var(--cream-ink); box-shadow:0 10px 30px rgba(0,0,0,.25); overflow:auto; }
  .card.dark{ background:var(--panel); border:1px solid var(--line); }
  .tag{ display:inline-block; font-weight:900; font-size:12px; letter-spacing:.1em; text-transform:uppercase;
    background:var(--amber); color:#3a2c00; padding:5px 12px; border-radius:999px; margin-bottom:12px; }
  .tag.read{background:var(--amber)} .tag.wow{background:#ff6b8a;color:#3a0010}
  .tag.do{background:var(--mint);color:var(--accent-on)} .tag.try{background:#ffd766;color:#3a2c00}
  .card h3{ font-size:clamp(18px,2vw,24px); margin-bottom:8px; }
  .card.cream p, .card.cream li{ font-size:clamp(15px,1.45vw,19px); line-height:1.45; }
  .notice{ margin-top:12px; background:var(--notice-bg); border-left:5px solid var(--notice-border); color:var(--notice-ink);
    padding:10px 13px; border-radius:10px; font-size:14.5px; }
  .notice b{color:#6b4428}

  .hook{ background:var(--panel2); border:1px solid var(--line); border-radius:var(--radius); padding:10px 15px; }
  .hook .lbl{ color:var(--amber2); font-weight:800; font-size:12px; letter-spacing:.08em; text-transform:uppercase; }
  .hook p{ font-size:clamp(15px,1.5vw,20px); margin-top:5px; line-height:1.3; }

  .card.dark.wp{ padding:14px 16px; }
  .wp h4{ color:var(--ink); font-size:16px; margin-bottom:8px; }
  .wp-grid{ display:grid; grid-template-columns:1fr 1fr; gap:7px; }
  .chip{ background:var(--chip-bg); border:1px solid var(--line); border-radius:11px; padding:7px 10px; }
  .chip b{ display:block; font-size:14.5px; color:var(--mint); }
  .chip span{ font-size:12px; color:var(--ink-dim); line-height:1.25; }

  .brain{ background:linear-gradient(150deg,var(--panel),var(--panel2)); border:1px solid var(--line); border-radius:var(--radius); padding:12px 16px; }
  .brain .lbl{ display:flex; align-items:center; gap:9px; color:var(--amber2); font-weight:800; letter-spacing:.06em; text-transform:uppercase; font-size:12px; margin-bottom:8px;}
  .brain ol{ list-style:none; display:flex; flex-direction:column; gap:7px; }
  .brain li{ display:flex; gap:10px; font-size:clamp(13.5px,1.35vw,17px); line-height:1.28; }
  .brain .n{ flex:none; width:24px; height:24px; border-radius:50%; display:grid; place-items:center;
    font-weight:900; font-size:13px; color:var(--accent-on); background:linear-gradient(135deg,var(--mint),var(--accent)); }

  .know-card h3{font-size:17px;margin:8px 0 6px}
  .know-list{margin:8px 0 0;padding-left:18px;font-size:14px;line-height:1.45;color:var(--ink-dim)}
  .know-list li{margin-bottom:6px}
  .discuss-card h3{font-size:17px}
  .discuss-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:10px;padding:0;margin-left:0}
  .discuss-list li{display:flex;gap:10px;font-size:14px;line-height:1.35}
  .discuss-list .n{flex:none;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:11px;background:var(--chip-bg);border:1px solid var(--line)}
  .discuss-tip{margin-top:10px;font-size:13px;color:var(--ink-faint);font-style:italic}
  .sort-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
  .sort-col{background:var(--chip-bg);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:13px}
  .sort-col b{display:block;margin-bottom:6px;color:var(--mint);font-size:12px;letter-spacing:.06em;text-transform:uppercase}

  .steps{ background:var(--cream); color:var(--cream-ink); border-radius:var(--radius); padding:18px 20px; }
  .steps .tag{margin-bottom:14px}
  .steps .row{ display:flex; gap:14px; align-items:flex-start; padding:12px 0; border-bottom:1px dashed #d8cda6;}
  .steps .row:last-child{border-bottom:none}
  .steps .num{ flex:none; width:30px; height:30px; border-radius:50%; background:var(--panel2); color:var(--mint);
    display:grid; place-items:center; font-weight:900; }
  .steps .row b{ font-size:18px; display:block; }
  .steps .row span{ font-size:15px; color:#4a5a54; }

  
  /* 15-minute demonstrable win */
  .win15{
    background:linear-gradient(135deg, color-mix(in srgb, var(--mint, #3d9b8f) 18%, transparent), var(--panel2, var(--panel)));
    border:1px solid color-mix(in srgb, var(--mint, #3d9b8f) 45%, var(--line));
    border-radius:var(--radius); padding:12px 14px; margin-bottom:2px;
  }
  .win15 .lbl{
    font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
    color:var(--mint, #2a9d8f); margin-bottom:6px;
  }
  .win15 .can{
    font-family:inherit; font-size:clamp(16px,1.9vmin,22px); font-weight:800;
    letter-spacing:-.02em; line-height:1.25; margin:0 0 8px;
  }
  .win15 .prove{
    font-size:13.5px; color:var(--ink-dim, #4a5a54); line-height:1.4; margin:0;
  }
  .win15 .prove b{ color:var(--ink); }

  .exit{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; }
  .exit h4{ font-size:20px; margin-bottom:12px; }
  .exit-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .echk{ display:flex; gap:10px; align-items:center; background:var(--chip-bg); border:1px solid var(--line);
    border-radius:12px; padding:10px 12px; font-size:14.5px; }
  .echk .bx{ flex:none; width:24px;height:24px;border-radius:7px;background:var(--mint);color:var(--accent-on);
    display:grid;place-items:center;font-weight:900; }

  .imgframe{ position:relative; border-radius:14px; overflow:hidden; border:1px solid var(--line); background:var(--chip-bg); }
  .imgframe img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center; display:block; }
  .imgframe.diagram img{ object-fit:contain; background:var(--bg0); }
  .imgframe.fit img{ object-fit:contain; }
  .imgframe .cap,
  .imgrow .ic .cap{ position:absolute; left:0; right:0; bottom:0; z-index:1;
    background:linear-gradient(transparent, rgba(20,16,12,.92)); color:#faf6f0; font-size:12.5px; padding:18px 12px 8px; font-weight:600; }
  .imgrow{ display:grid; gap:6px; min-height:0; align-items:stretch; }
  .imgrow .ic{ position:relative; min-height:0; min-width:0; border-radius:11px; overflow:hidden; border:1px solid var(--line); background:var(--chip-bg); }
  .imgrow .ic img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center; display:block; }
  .imgrow .ic.fit img{ object-fit:contain; background:var(--bg0); }

  table.dt{ width:100%; border-collapse:collapse; font-size:15px; }
  table.dt th, table.dt td{ border:1px solid var(--line); padding:8px 10px; text-align:left; }
  table.dt th{ background:var(--panel2); color:var(--mint); }
  .card.cream table.dt th{ background:#efe6c8; color:#3a2c00;}
  .card.cream table.dt th, .card.cream table.dt td{ border-color:#d8cda6;}

  .bank{ display:flex; flex-wrap:wrap; gap:8px; margin:8px 0 4px;}
  .bank span{ background:var(--chip-bg);border:1px solid var(--line);color:var(--mint);
    padding:6px 12px;border-radius:999px;font-weight:700;font-size:14px;}

  .slide.cover{ align-items:flex-start; justify-content:center; text-align:left; }
  .cover .sub{ font-size:clamp(18px,2.2vw,26px); color:var(--ink-dim); max-width:760px; line-height:1.4;}
  .cover .meta{ margin-top:auto; display:flex; gap:22px; flex-wrap:wrap; color:var(--ink-faint); font-weight:700; letter-spacing:.05em;}
  .cover .pill{ background:rgba(217,160,112,.10); border:1px solid rgba(217,160,112,.25); color:var(--mint); padding:8px 16px; border-radius:999px;}

  .slide.divider{ justify-content:center; }
  .divider .pkr{ font-size:clamp(20px,3vw,30px); color:var(--ink-dim); font-weight:800; letter-spacing:.2em; text-transform:uppercase;}
  .divider h1{ font-size:clamp(40px,6vw,72px); margin:10px 0 18px;}
  .divider .goals{ display:flex; flex-direction:column; gap:12px; max-width:840px;}
  .divider .goal{ display:flex; gap:14px; align-items:center; font-size:clamp(17px,1.9vw,22px); background:var(--panel); border:1px solid var(--line); padding:14px 18px; border-radius:14px;}
  .divider .goal i{ flex:none; width:34px;height:34px;border-radius:10px; display:grid;place-items:center;font-style:normal;font-weight:900;color:var(--accent-on);}

  .slide.checkpoint{ justify-content:center; text-align:center; align-items:center;}
  .checkpoint h1{font-size:clamp(34px,5vw,60px)}
  .checkpoint p{font-size:clamp(18px,2vw,24px); color:var(--ink-dim); max-width:780px; margin:14px auto 24px;}

  .eyebrow-r{ position:absolute; right:38px; top:30px; color:var(--ink-faint); font-size:12px; font-weight:800; letter-spacing:.14em; text-transform:uppercase;}

  /* Present mode — scale slide to fill viewport (Teams / laptop share) */
  html.presenting body,html:fullscreen body{align-items:stretch;justify-content:stretch;background:var(--bg1);}
  html.presenting #app,html:fullscreen #app{height:100dvh;}
  html.presenting #nav,html:fullscreen #nav{flex-shrink:0;padding:8px 10px;background:var(--bg0);border-top:1px solid var(--line);}
  html.presenting #stageWrap,html:fullscreen #stageWrap{
    padding:0;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden;
    background:var(--bg1);
  }
  html.presenting .slide,html:fullscreen .slide{
    width:1180px;height:738px;max-width:none;max-height:none;aspect-ratio:auto;flex-shrink:0;
    border-radius:0;border:none;box-shadow:none;
    padding:26px 38px 48px;
    transform-origin:center center;
  }
  html.presenting .cols,html:fullscreen .cols{flex:1;min-height:0;align-content:stretch;grid-template-rows:minmax(0,1fr);}
  html.presenting .col,html:fullscreen .col{height:100%;min-height:0;}
  html.presenting .col > .card.cream,html.presenting .col > .steps,html.presenting .col > .brain,html.presenting .col > .hook,
  html:fullscreen .col > .card.cream,html:fullscreen .col > .steps,html:fullscreen .col > .brain,html:fullscreen .col > .hook{
    flex:1 1 0;min-height:0;max-height:none;overflow:auto;
  }
  html.presenting .col > .imgframe,html.presenting .col > .imgrow,
  html:fullscreen .col > .imgframe,html:fullscreen .col > .imgrow{
    flex:1 1 0;min-height:100px;max-height:none;overflow:hidden;
  }
  html.presenting .col > .exit,html:fullscreen .col > .exit{flex:0 0 auto;}
  html.presenting h1.title,html:fullscreen h1.title{font-size:clamp(32px,4.2vmin,56px);}
  html.presenting .card h3,html:fullscreen .card h3{font-size:clamp(20px,2.4vmin,30px);}
  html.presenting .card.cream p,html.presenting .card.cream li,html:fullscreen .card.cream p,html:fullscreen .card.cream li{font-size:clamp(16px,1.9vmin,26px);}
  html.presenting .hook p,html:fullscreen .hook p{font-size:clamp(16px,2vmin,28px);}
  html.presenting .brain li,html:fullscreen .brain li{font-size:clamp(15px,1.75vmin,24px);}
  html.presenting .steps .row b,html:fullscreen .steps .row b{font-size:clamp(18px,2.1vmin,28px);}
  html.presenting .steps .row span,html:fullscreen .steps .row span{font-size:clamp(15px,1.75vmin,24px);}
  html.presenting .exit h4,html:fullscreen .exit h4{font-size:clamp(20px,2.4vmin,30px);}
  html.presenting .echk,html:fullscreen .echk{font-size:clamp(14px,1.65vmin,22px);}
  html.presenting .chip b,html:fullscreen .chip b{font-size:clamp(15px,1.75vmin,24px);}
  html.presenting .chip span,html:fullscreen .chip span{font-size:clamp(13px,1.5vmin,20px);}
  html.presenting .notice,html:fullscreen .notice{font-size:clamp(14px,1.65vmin,22px);}

  #nav{ display:flex; align-items:center; justify-content:center; gap:10px; padding:10px; flex-wrap:wrap; }
  .btn{ background:var(--panel2); color:var(--ink); border:1px solid var(--line); border-radius:999px;
    padding:9px 16px; font-weight:700; font-size:14px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
  .btn:hover{ border-color:var(--mint); color:#fff;}
  .btn.primary{ background:var(--mint); color:var(--accent-on); border-color:var(--mint);}
  .btn.assess{ background:linear-gradient(135deg,var(--amber),#ff9d3c); color:#3a2400; border:none; font-weight:900;}
  .btn.worksheets.linked{ background:linear-gradient(135deg,#7eb8ff,#5aa9ff); color:#0a1a30; border:none; font-weight:800; }
  .btn.worksheets.unlinked{ background:var(--panel2); color:var(--ink-faint); border:1px solid var(--line); font-weight:700; }
  .btn.worksheets.unlinked:hover{ border-color:var(--line); color:var(--ink-faint); }
  .btn.notes-open{border-color:var(--mint);color:#fff;box-shadow:0 0 0 1px rgba(217,160,112,.35);}

  /* appendix — embedded worksheet PDFs */
  .slide.appendix .appendix-sub{ font-size:clamp(14px,1.45vw,18px); color:var(--ink-dim); line-height:1.4; margin:0 0 10px; max-width:920px; }
  .slide.appendix .pdfFrame{ flex:1; min-height:0; border-radius:14px; overflow:hidden; border:1px solid var(--line); background:var(--bg0); }
  .slide.appendix .pdfFrame iframe{ width:100%; height:100%; border:0; display:block; }
  .slide.appendix .pdfOpen{ margin-top:8px; align-self:flex-start; }
  .slide.appendix .pdfOpen a{ text-decoration:none; }
  .slide.appendix-index .worksheetList{ display:flex; flex-direction:column; gap:12px; flex:1; min-height:0; overflow:auto; max-width:720px; width:100%; }
  .slide.appendix-index .worksheetCard{ text-align:left; background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:18px 20px; cursor:pointer; color:var(--ink); font-family:inherit; width:100%; transition:border-color .15s, background .15s, box-shadow .15s; }
  .slide.appendix-index .worksheetCard:hover{ border-color:var(--accent); background:var(--panel2); }
  .slide.appendix-index .worksheetCard.highlight{ background:linear-gradient(135deg, rgba(90,169,255,.2), rgba(126,184,255,.08)); border-color:#5aa9ff; box-shadow:0 0 0 1px rgba(90,169,255,.4), 0 8px 24px rgba(90,169,255,.12); }
  .slide.appendix-index .worksheetCard.highlight b{ color:#b8dcff; }
  .slide.appendix-index .worksheetCard.highlight span{ color:#d4e8ff; }
  .slide.appendix-index .worksheetCard b{ display:block; font-size:clamp(17px,1.8vw,22px); margin-bottom:6px; color:var(--amber2); }
  .slide.appendix-index .worksheetCard span{ font-size:14.5px; color:var(--ink-dim); line-height:1.45; }
  .worksheetBack{ align-self:flex-start; margin-bottom:8px; }

  #counter{ font-weight:800; color:var(--ink-dim); min-width:74px; text-align:center; }
  select#jump{ background:var(--panel2); color:var(--ink); border:1px solid var(--line); border-radius:999px; padding:9px 12px; font-size:13px; max-width:230px; }

  #tnotes{ position:fixed; right:0; top:0; height:100%; width:min(440px,90vw); transform:translateX(100%);
    transition:transform .28s ease; background:var(--bg1); border-left:1px solid var(--line); z-index:40;
    box-shadow:-20px 0 60px rgba(0,0,0,.5); display:flex; flex-direction:column;}
  #tnotes.open{ transform:none;}
  html.presenting #tnotes,html:fullscreen #tnotes{z-index:100;height:100dvh;}
  #tnotes header{ padding:18px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:12px; flex-shrink:0;}
  #tnotes header b{ color:var(--amber2); letter-spacing:.04em;}
  #tnotes header .slide-label{display:block;font-size:12px;font-weight:700;color:var(--ink-faint);letter-spacing:.06em;text-transform:uppercase;margin-top:4px;}
  #tnotes .body{ padding:20px; overflow:auto; flex:1; min-height:0; font-size:15.5px; line-height:1.55; color:var(--ink-dim);}
  #tnotes .body h4{color:var(--mint); margin:14px 0 6px; font-size:16px;}
  #tnotes .body ul{margin:6px 0 6px 18px;}
  #tnotes .body li{margin:4px 0;}

  #overlay{ position:fixed; inset:0; background:rgba(8,14,18,.84); backdrop-filter:blur(6px); z-index:60;
    display:none; align-items:center; justify-content:center; padding:24px;}
  #overlay.open{display:flex;}
  .modal{ width:min(1100px,100%); height:min(88vh,820px); background:linear-gradient(160deg,var(--bg1),var(--bg2));
    border:1px solid var(--line); border-radius:22px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 40px 100px rgba(0,0,0,.6);}
  .modal header{ padding:16px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:14px;}
  .modal header h2{ font-size:22px; margin-right:auto;}
  .tabs{ display:flex; gap:8px;}
  .tab{ background:var(--panel2); border:1px solid var(--line); color:var(--ink-dim); padding:8px 16px; border-radius:999px; cursor:pointer; font-weight:700; font-size:14px;}
  .tab.active{ background:var(--amber); color:#3a2400; border-color:var(--amber);}
  .modal .content{ padding:24px; overflow:auto; flex:1;}
  .modal .content h3{ color:var(--mint); margin:18px 0 8px; font-size:20px;}
  .modal .content h3:first-child{margin-top:0}
  .modal .content p, .modal .content li{ font-size:16px; line-height:1.55; color:var(--ink); }
  .modal .content ul{margin:6px 0 6px 20px}
  .panelpane{display:none} .panelpane.active{display:block}
  .rubric{ width:100%; border-collapse:collapse; font-size:13px; margin-top:8px;}
  .rubric th,.rubric td{ border:1px solid var(--line); padding:8px; vertical-align:top; text-align:left;}
  .rubric th{ background:var(--panel2); color:var(--amber2);}
  .rubric td:first-child{ background:var(--chip-bg); color:var(--mint); font-weight:800; width:150px;}
  .rubric .A{background:rgba(217,160,112,.06)}
  .assess-doc .assess-open{ margin-bottom:12px; }
  .assess-doc .assess-open a{ color:var(--amber2); font-weight:800; }

/* =========================================================
   RENDERERS
   ========================================================= */
function bq(arr){
  return `<div class="brain"><div class="lbl">🧠 Brain Questions — talk it out</div>
    <ol>${arr.map((q,i)=>`<li><span class="n">${i+1}</span><span>${q}</span></li>`).join('')}</ol></div>`;
}
function wordpower(list){
  return `<div class="card dark wp"><h4>Word Power</h4><div class="wp-grid">${
    list.map(w=>`<div class="chip"><b>${w.t}</b><span>${w.d}</span></div>`).join('')}</div></div>`;
}
function hook(q){ return `<div class="hook"><div class="lbl">Hook question</div><p>${q}</p></div>`; }
function readCard(r){
  return `<div class="card cream"><span class="tag ${r.wow?'wow':'read'}">${r.label||(r.wow?'WOW · READ':'READ')}</span>
    <h3>${r.heading}</h3>${(r.body||[]).map(p=>`<p style="margin-bottom:10px">${p}</p>`).join('')}
    ${r.notice?`<div class="notice"><b>Notice:</b> ${r.notice}</div>`:''}</div>`;
}

function win15(b){
  return `<div class="win15"><div class="lbl">⏱ By 15 minutes · demonstrable win</div>
    <p class="can">I can ${b.can}</p>
    <p class="prove"><b>Prove it:</b> ${b.prove}</p></div>`;
}


function knowCard(k){
  const body=(k.body||[]).map(p=>`<p style="margin-bottom:8px;line-height:1.4">${p}</p>`).join('');
  const pts=(k.points||[]).map(p=>`<li>${p}</li>`).join('');
  return `<div class="card cream know-card"><span class="tag read">${k.label||'KNOWLEDGE'}</span>
    ${k.heading?`<h3>${k.heading}</h3>`:''}${body}
    ${pts?`<ul class="know-list">${pts}</ul>`:''}
    ${k.fact?`<div class="notice"><b>Key idea:</b> ${k.fact}</div>`:''}</div>`;
}
function discussCard(d){
  return `<div class="card dark discuss-card"><span class="tag try">${d.label||'DISCUSS'}</span>
    <h3>${d.title||'Talk it through'}</h3>
    <ul class="discuss-list">${(d.prompts||[]).map((p,i)=>`<li><span class="n">${i+1}</span><span>${p}</span></li>`).join('')}</ul>
    ${d.tip?`<p class="discuss-tip">${d.tip}</p>`:''}</div>`;
}

function exitCheck(items){
  return `<div class="exit"><h4>Exit check — I can…</h4><div class="exit-grid">${
    items.map(i=>`<div class="echk"><span class="bx">✓</span><span>${i}</span></div>`).join('')}</div></div>`;
}
function steps(s){
  return `<div class="steps"><span class="tag do">${s.label||'DO THIS'}</span>
    ${s.rows.map((r,i)=>`<div class="row"><div class="num">${i+1}</div><div><b>${r.t}</b><span>${r.d||''}</span></div></div>`).join('')}</div>`;
}
function rawHtml(h){ return h; }

function worksheetSlugsFor(s){
  if(s.type === 'appendix' && s.slug) return [s.slug];
  if(s.type === 'appendix-index') return ['__index__'];
  const link = s.worksheet || WORKBOOK_BY_NAV[s.nav];
  if(!link) return [];
  return Array.isArray(link) ? link : [link];
}
function openSlideWorksheets(csv){
  const slugs = (csv || '').split(',').filter(Boolean);
  if(slugs.length === 1 && slugs[0] === '__index__'){ goWorksheets(); return; }
  if(slugs.length === 1){
    const i = SLIDES.findIndex(s => s.slug === slugs[0]);
    if(i >= 0){ show(i); return; }
  }
  if(slugs.length) goWorksheets();
}
function highlightedWorksheetSlugs(){
  if(worksheetContextIdx == null) return [];
  const s = SLIDES[worksheetContextIdx];
  if(!s || s.type === 'appendix-index' || s.type === 'appendix') return [];
  return worksheetSlugsFor(s).filter(x => x !== '__index__');
}
function syncWorksheetsBtn(){
  const btn = document.getElementById('worksheetsBtn');
  const slugs = worksheetSlugsFor(SLIDES[idx]);
  const linked = slugs.length > 0 && !(slugs.length === 1 && slugs[0] === '__index__');
  btn.classList.toggle('linked', linked);
  btn.classList.toggle('unlinked', !linked);
  btn.title = linked ? 'Open linked worksheet (W)' : 'No worksheet on this slide (W)';
}
function clickWorksheets(){
  worksheetContextIdx = idx;
  const slugs = worksheetSlugsFor(SLIDES[idx]).filter(x => x !== '__index__');
  if(slugs.length === 1) openSlideWorksheets(slugs[0]);
  else goWorksheets();
}
function backToLesson(){
  if(worksheetContextIdx != null && SLIDES[worksheetContextIdx]) show(worksheetContextIdx);
}
function worksheetBackBtn(){
  if(worksheetContextIdx == null || !SLIDES[worksheetContextIdx]) return '';
  return `<button type="button" class="btn primary worksheetBack" onclick="backToLesson()">← Back to lesson</button>`;
}

function renderSlide(s){
  const el = document.getElementById('slide');
  el.className = 'slide ' + (s.type||'lesson');
  el.style.background = '';
  if(s.type==='cover' && s.bg){
    el.style.background = `linear-gradient(90deg, rgba(14,10,18,.95) 30%, rgba(14,10,18,.45) 70%, rgba(14,10,18,.25)), url('${s.bg}') ${s.bgPos||'right center'} / cover no-repeat`;
  }
  let html='';
  if(s.eyebrowR) html+=`<div class="eyebrow-r">${s.eyebrowR}</div>`;

  if(s.type==='cover'){
    html += `<span class="eyebrow">${s.eyebrow||''}</span>
      <h1 class="title">${s.title}</h1><p class="sub">${s.sub||''}</p>`;
  }
  else if(s.type==='divider'){
    html += `<div class="pkr">${s.eyebrow||''}</div><h1>${s.title}</h1>
      <div class="goals">${(s.goals||[]).map((g,i)=>`<div class="goal"><i style="background:var(--p${(i%5)+1})">${i+1}</i><span>${g}</span></div>`).join('')}</div>`;
  }
  else if(s.type==='checkpoint'){
    html += `<span class="eyebrow" style="align-self:center">${s.eyebrow||''}</span>
      <h1>${s.title}</h1><p>${s.sub||''}</p>
      <button class="btn assess" style="padding:14px 26px;font-size:17px" onclick="openOverlay()">📋 Open assessment (task &amp; sources)</button>`;
  }
  else if(s.type==='appendix-index'){
    const hi = highlightedWorksheetSlugs();
    html += worksheetBackBtn();
    html += `<span class="eyebrow">${s.eyebrow||''}</span>
      <h1 class="title">${s.title}</h1>
      ${s.sub?`<p class="appendix-sub">${s.sub}</p>`:''}
      <div class="worksheetList">${(s.items||[]).map(it=>{
        const i = SLIDES.findIndex(x => x.slug === it.slug);
        const hl = hi.includes(it.slug) ? ' highlight' : '';
        return `<button type="button" class="worksheetCard${hl}" onclick="show(${i})"><b>${it.title}</b><span>${it.desc}</span></button>`;
      }).join('')}</div>`;
  }
  else if(s.type==='appendix'){
    const pdf = s.pdf || WORKBOOK_PDF;
    html += worksheetBackBtn();
    html += `<span class="eyebrow">${s.eyebrow||''}</span>
      <h1 class="title">${s.title}</h1>
      ${s.sub?`<p class="appendix-sub">${s.sub}</p>`:''}
      <div class="pdfFrame"><iframe src="${pdf}" title="${s.title}"></iframe></div>
      <p class="pdfOpen"><a class="btn worksheets linked" href="${pdf}" target="_blank" rel="noopener">Open PDF in new tab ↗</a></p>`;
  }
  else {
    if(s.eyebrow) html+=`<span class="eyebrow">${s.eyebrow}</span>`;
    html += `<h1 class="title">${s.title}</h1>`;
    const left = (s.left||[]).map(renderBlock).join('');
    const right = (s.right||[]).map(renderBlock).join('');
    html += `<div class="cols ${s.wideLeft?'wide-left':''}"><div class="col">${left}</div><div class="col">${right}</div></div>`;
  }
  el.innerHTML = html;
}

function renderBlock(b){
  switch(b.k){
    case 'read': return readCard(b);
    case 'hook': return hook(b.q);
    case 'wp': return wordpower(b.list);
    case 'brain': return bq(b.q);
    case 'steps': return steps(b);
    case 'win15': return win15(b);
    case 'know': return knowCard(b);
    case 'discuss': return discussCard(b);
    case 'exit': return exitCheck(b.items);
    case 'img': return `<div class="imgframe${b.diagram?' diagram':''}${b.fit?' fit':''}"><img src="${b.src}" alt="${b.alt||''}" loading="lazy">${b.cap?`<div class="cap">${b.cap}</div>`:''}</div>`;
    case 'imgrow': { const n=Math.min(b.items.length,4);
      const cells=b.items.map(it=>`<div class="ic${it.fit?' fit':''}"><img src="${it.src}" alt="${it.alt||it.label||''}" loading="lazy">${it.cap?`<div class="cap">${it.cap}</div>`:''}</div>`).join('');
      return `<div class="imgrow" style="grid-template-columns:repeat(${n},1fr)">${cells}</div>`; }
    case 'html': return rawHtml(b.html);
    default: return '';
  }
}

/* =========================================================
   NAV + STATE
   ========================================================= */
let idx = 0;
let worksheetContextIdx = null;
function show(i){
  idx = Math.max(0, Math.min(SLIDES.length-1, i));
  renderSlide(SLIDES[idx]);
  document.getElementById('counter').textContent = `${idx+1} / ${SLIDES.length}`;
  document.getElementById('jump').value = idx;
  if(document.getElementById('tnotes').classList.contains('open')) fillNotes();
  syncWorksheetsBtn();
  requestAnimationFrame(updatePresentScale);
}
function buildJump(){
  const sel=document.getElementById('jump'); sel.innerHTML='';
  SLIDES.forEach((s,i)=>{ const o=document.createElement('option'); o.value=i;
    o.textContent=`${i+1}. ${s.nav||s.title||('Slide '+(i+1))}`; sel.appendChild(o); });
}
function fillNotes(){
  const s=SLIDES[idx];
  document.getElementById('tnotesTitle').textContent=s.nav||s.title||`Slide ${idx+1}`;
  document.getElementById('tnotesBody').innerHTML = s.notes || '<p>No notes for this screen.</p>';
}
function openNotes(){ document.getElementById('tnotes').classList.add('open'); document.getElementById('notesBtn').classList.add('notes-open'); fillNotes(); }
function closeNotes(){ document.getElementById('tnotes').classList.remove('open'); document.getElementById('notesBtn').classList.remove('notes-open'); }
function detachNotes(){
  const s=SLIDES[idx];
  const w=window.open('','tnotes','width=460,height=760');
  w.document.write(`<title>Teacher Notes — ${s.nav||s.title}</title>
    <style>body{font-family:system-ui;background:#1c1610;color:#c9bcb0;line-height:1.6;padding:22px;}
    h2{color:#ffe082} h4{color:#d9a070;margin:14px 0 4px} ul{margin-left:18px} li{margin:4px 0}</style>
    <h2>${s.nav||s.title}</h2>${s.notes||'<p>No notes.</p>'}`);
  w.document.close();
}
let savedIdxForOverlay=null;
function switchAssessTab(pane){
  document.querySelectorAll('#overlay .tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('#overlay .panelpane').forEach(x=>x.classList.remove('active'));
  document.querySelector(`#overlay .tab[data-pane="${pane}"]`)?.classList.add('active');
  document.getElementById('pane-'+pane)?.classList.add('active');
}
function openOverlay(forcedPane){
  savedIdxForOverlay=idx;
  const slide = SLIDES[idx];
  const pane = (typeof forcedPane === 'string' && forcedPane)
    || slide?.assessTab
    || ASSESS_TAB_BY_NAV[slide?.nav]
    || 'task';
  switchAssessTab(pane);
  document.getElementById('overlay').classList.add('open');
}
function closeOverlay(){ document.getElementById('overlay').classList.remove('open');
  if(savedIdxForOverlay!=null){ show(savedIdxForOverlay); } }
function goWorksheets(){
  const i = SLIDES.findIndex(s => s.type === 'appendix-index');
  if(i >= 0) show(i);
}

document.getElementById('prev').onclick=()=>show(idx-1);
document.getElementById('next').onclick=()=>show(idx+1);
document.getElementById('jump').onchange=e=>show(+e.target.value);
document.getElementById('notesBtn').onclick=openNotes;
document.getElementById('notesClose').onclick=closeNotes;
document.getElementById('detachBtn').onclick=detachNotes;
document.getElementById('assessBtn').onclick=()=>openOverlay();
document.getElementById('worksheetsBtn').onclick=clickWorksheets;
document.getElementById('backBtn').onclick=closeOverlay;

function isPresenting(){
  return document.documentElement.classList.contains('presenting')
    || document.fullscreenElement || document.webkitFullscreenElement;
}
function setPresenting(on){
  document.documentElement.classList.toggle('presenting', on);
  syncPresentBtn();
  requestAnimationFrame(()=>requestAnimationFrame(updatePresentScale));
}
function updatePresentScale(){
  const slide=document.getElementById('slide');
  if(!isPresenting()){ slide.style.transform=''; document.documentElement.style.removeProperty('--present-scale'); return; }
  const wrap=document.getElementById('stageWrap');
  const scale=Math.min(wrap.clientWidth/1180, wrap.clientHeight/738);
  document.documentElement.style.setProperty('--present-scale', scale);
  slide.style.transform=`scale(${scale})`;
}
function togglePresent(){
  if(isPresenting()){
    setPresenting(false);
    if(document.fullscreenElement||document.webkitFullscreenElement)
      (document.exitFullscreen||document.webkitExitFullscreen||document.msExitFullscreen)?.call(document);
  } else {
    setPresenting(true);
    const el=document.documentElement;
    const req=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;
    if(req){
      const p=req.call(el);
      if(p&&p.then) p.then(()=>requestAnimationFrame(updatePresentScale)).catch(()=>{});
    }
  }
}
function syncPresentBtn(){
  document.getElementById('presentBtn').textContent = isPresenting() ? '⤢ Exit' : '⛶ Present';
}
function onFullscreenChange(){
  if(!document.fullscreenElement&&!document.webkitFullscreenElement)
    document.documentElement.classList.remove('presenting');
  syncPresentBtn();
  requestAnimationFrame(updatePresentScale);
}
document.getElementById('presentBtn').onclick=togglePresent;
document.addEventListener('fullscreenchange',onFullscreenChange);
document.addEventListener('webkitfullscreenchange',onFullscreenChange);
window.addEventListener('resize',updatePresentScale);
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchAssessTab(t.dataset.pane));
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='SELECT') return;
  if(e.key==='ArrowRight') show(idx+1);
  else if(e.key==='ArrowLeft') show(idx-1);
  else if(e.key.toLowerCase()==='t'){ document.getElementById('tnotes').classList.contains('open')?closeNotes():openNotes(); }
  else if(e.key.toLowerCase()==='d') detachNotes();
  else if(e.key.toLowerCase()==='a'){ document.getElementById('overlay').classList.contains('open')?closeOverlay():openOverlay(); }
  else if(e.key.toLowerCase()==='w') clickWorksheets();
  else if(e.key.toLowerCase()==='f') togglePresent();
  else if(e.key==='Escape'){
    if(document.getElementById('tnotes').classList.contains('open')){ closeNotes(); return; }
    if(isPresenting()){ togglePresent(); return; }
    closeOverlay(); closeNotes();
    const t = SLIDES[idx]?.type;
    if((t === 'appendix' || t === 'appendix-index') && worksheetContextIdx != null) backToLesson();
  }
});

document.getElementById('pane-task').innerHTML = ASSESS_TASK;
document.getElementById('pane-source1').innerHTML = ASSESS_SOURCE1;
document.getElementById('pane-source2').innerHTML = ASSESS_SOURCE2;
document.getElementById('pane-guide').innerHTML = ASSESS_GUIDE;

buildJump(); show(0);
</script>
